<!DOCTYPE html>
<html>
<head>
  <title>Open Map</title>
  <script>
    function openMap() {
      // Read values from URL
      const params = new URLSearchParams(window.location.search);
      const lat = params.get("lat");
      const lon = params.get("lon");

      if (lat && lon) {
        window.location.href = "https://www.google.com/maps?q=" + lat + "," + lon;
      } else {
        document.body.innerHTML = "<h3>No location received</h3>";
      }
    }
  </script>
</head>
<body onload="openMap()">
  <h2>Opening Google Maps...</h2>
</body>
</html>
